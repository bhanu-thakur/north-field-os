<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#A8C789">
    <title>Dhaula v4.0</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23A8C789' d='M12 2L2 7l10 5 10-5-10-5z'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/design-system.css">
    <script>
        (function() {
            try {
                let theme = localStorage.getItem('nf_theme');
                if (!theme) {
                    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {}
        })();
    </script>
</head>
<body>
    <!-- SVG Sprite -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <symbol id="i-home" viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10.5V20h12v-9.5"/><path d="M10 20v-5h4v5"/></symbol>
        <symbol id="i-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></symbol>
        <symbol id="i-compass" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m15.5 8.5-2 5-5 2 2-5z"/></symbol>
        <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></symbol>
        <symbol id="i-star" viewBox="0 0 24 24"><path d="m12 4 2.5 5 5.5.8-4 3.9 1 5.5L12 17l-4.9 2.6 1-5.5-4-3.9 5.5-.8z"/></symbol>
        <symbol id="i-bulb" viewBox="0 0 24 24"><path d="M9.5 18.5h5M10.5 21h3M8 11a4 4 0 1 1 8 0c0 2-1.4 3-2 4.5h-4C9.4 14 8 13 8 11z"/></symbol>
        <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></symbol>
        <symbol id="i-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></symbol>
        <symbol id="i-building" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01M16 6h.01M12 6h.01M12 10h.01M16 10h.01M8 10h.01M8 14h.01M12 14h.01M16 14h.01"></path></symbol>
        <symbol id="i-spark" viewBox="0 0 24 24"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></symbol>
        <symbol id="i-cross" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></symbol>
        <symbol id="i-users" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
        <symbol id="i-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></symbol>
        <symbol id="i-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></symbol>
        <symbol id="i-people" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></symbol>
        <symbol id="i-stack" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 12 12 17 22 12"></polyline><polyline points="2 17 12 22 22 17"></polyline></symbol>
    </svg>

    <div class="app" id="app-root">
        <!-- Layout injected by app.js -->
    </div>
    
    <!-- Toast Root -->
    <div id="toast-root" class="toast-container"></div>

    <!-- Custom Dialog Overlay -->
    <div id="dialog-backdrop" style="display:none; position:fixed; inset:0; background:rgba(20,40,30,0.5); backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center;">
        <div class="card" style="width:90%; max-width:440px; padding:24px; box-shadow:0 24px 48px rgba(0,0,0,0.2);">
            <h3 id="dialog-title" style="margin-bottom:16px; font-size:1.2rem;">Title</h3>
            <p id="dialog-msg" style="margin-bottom:20px; color:var(--ink-soft); display:none; font-size:1rem;"></p>
            <textarea id="dialog-input" class="input" style="width:100%; min-height:80px; margin-bottom:20px; font-size:1rem;" placeholder="Type here..."></textarea>
            <div style="display:flex; justify-content:flex-end; gap:12px;">
                <button id="dialog-btn-cancel" class="btn" onclick="app.closeDialog(false)">Cancel</button>
                <button id="dialog-btn-confirm" class="btn btn--primary" onclick="app.closeDialog(true)">Save</button>
            </div>
        </div>
    </div>

    <!-- Interactive Tour Overlay -->
    <div id="tour-backdrop" class="tour-overlay">
        <h3 id="tour-step-title">Step 1</h3>
        <p id="tour-step-desc">Description</p>
        <div class="tour-actions">
            <button id="tour-btn-skip" style="background:transparent; color:var(--primary-soft); padding:8px 0;" onclick="app.endSimulator()">End Tour</button>
            <button id="tour-btn-next" onclick="app.nextTourStep()">Next</button>
        </div>
    </div>

    <!-- Global Universal Capture Modal -->
    <div id="uc-backdrop" onclick="if(event.target===this) app.toggleUniversalCapture()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); z-index:9999; justify-content:center; align-items:center; padding:16px;">
        <div style="width:100%; max-width:600px; background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:0 -12px 48px rgba(0,0,0,0.1); overflow:hidden; padding-bottom:env(safe-area-inset-bottom);">
            <div style="display:flex; justify-content:center; padding-top:12px; margin-bottom:-4px;"><div style="width:40px; height:4px; border-radius:2px; background:var(--line);"></div></div>
            <div style="padding:16px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;">
                <span style="font-family:'Roboto Mono',monospace; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--ink-faint);">Universal Capture</span>
                <span onclick="app.toggleUniversalCapture()" style="font-size:0.75rem; color:var(--ink-soft); cursor:pointer; font-weight:600;">Close ✕</span>
            </div>
            <div style="padding:24px;">
                <div style="position:relative; margin-bottom:8px;">
                    <textarea id="uc-input" placeholder="What did you see? (e.g. 'Met Arthur, he hates his current supplier...')" oninput="app.handleCaptureInput(event)" style="width:100%; min-height:40px; font-size:1.2rem; border:none; padding:0; background:transparent; resize:none; outline:none; box-shadow:none; color:var(--ink); line-height:1.5; font-family:'Roboto',sans-serif; overflow:hidden;"></textarea>
                    <div style="position:absolute; right:0; bottom:0; display:flex; gap:4px;">
                        <label for="uc-photo" class="btn btn--sm" style="background:transparent; border:none; color:var(--ink-soft); padding:8px; border-radius:50%; transition:all 0.2s; cursor:pointer;"><svg class="ic"><use href="#i-image"/></svg></label>
                        <input type="file" id="uc-photo" accept="image/*" capture="environment" style="display:none;" onchange="app.handlePhotoSelect(event)">
                        <button id="btn-mic" onclick="app.toggleVoiceCapture()" class="btn btn--sm" style="background:transparent; border:none; color:var(--ink-soft); padding:8px; border-radius:50%; transition:all 0.2s;"><svg class="ic"><use href="#i-mic"/></svg></button>
                    </div>
                </div>
                <div id="uc-photo-preview" style="display:none; width:60px; height:60px; border-radius:8px; background-size:cover; background-position:center; margin-bottom:12px; border:1px solid var(--line); position:relative;">
                    <button onclick="app.clearPhoto()" style="position:absolute; top:-6px; right:-6px; background:#c92a2a; color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:10px; cursor:pointer;">✕</button>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:0.8rem; color:var(--ink-faint); display:flex; align-items:center; gap:6px;"><svg class="ic" style="color:var(--good);"><use href="#i-spark"/></svg> Pattern Engine Active</span>
                    <button class="btn btn--primary" onclick="app.captureObservation()">Log Observation</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Business Modal -->
    <div id="add-business-backdrop" onclick="if(event.target===this) app.toggleAddBusiness()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); z-index:9999; justify-content:center; align-items:center; padding:16px;">
        <div style="width:100%; max-width:600px; background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:0 -12px 48px rgba(0,0,0,0.1); overflow:hidden; padding-bottom:env(safe-area-inset-bottom);">
            <div style="padding:16px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;">
                <span style="font-family:'Roboto Mono',monospace; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--ink-faint);">New Entity</span>
                <span onclick="app.toggleAddBusiness()" style="font-size:0.75rem; color:var(--ink-soft); cursor:pointer; font-weight:600;">Close ✕</span>
            </div>
            <div style="padding:24px;">
                <div style="display:flex; gap:16px; margin-bottom:16px;">
                    <div style="flex:1;">
                        <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:8px;">Business Name</label>
                        <input type="text" id="add-business-name" class="input" style="width:100%;" placeholder="e.g. Hotel Alpine">
                    </div>
                    <div style="flex:1;">
                        <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:8px;">Industry</label>
                        <input type="text" id="add-business-industry" class="input" style="width:100%;" placeholder="e.g. Hospitality">
                    </div>
                </div>
                
                <div style="display:flex; gap:16px; margin-bottom:16px;">
                    <div style="flex:1;">
                        <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:8px;">Contact Person</label>
                        <input type="text" id="add-business-dm" class="input" style="width:100%;" placeholder="e.g. Rajat (Owner)">
                    </div>
                    <div style="flex:1;">
                        <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:8px;">Phone</label>
                        <input type="tel" id="add-business-phone" class="input" style="width:100%;" placeholder="e.g. +91 98765 43210">
                    </div>
                </div>

                <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:8px;">Notes</label>
                <textarea id="add-business-notes" class="input" style="width:100%; min-height:80px; margin-bottom:24px; resize:none;" placeholder="Initial context or background..."></textarea>
                
                <div style="display:flex; justify-content:flex-end;">
                    <button class="btn btn--primary" style="width:100%; justify-content:center; padding:12px;" onclick="app.createBusiness()">Create Entity</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Engine Scripts -->
    <script src="modules/db.js"></script>
    <script src="data/personas.js"></script>
    <script src="app.js"></script>
    <script>
        // Only attempt to register ServiceWorker if served over http/https (prevents file:// crash)
        if ('serviceWorker' in navigator && (window.location.protocol === 'http:' || window.location.protocol === 'https:')) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Registration failed:', err));
        }
    </script>
</body>
</html>
