<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Field OS</title>
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="manifest" href="manifest.webmanifest">
</head>
<body>

    <!-- SVG Icon Sprite -->
    <svg style="display: none;">
        <symbol id="ic-mission" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </symbol>
        <symbol id="ic-inbox" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 12h-6l-2 3h-4l-2-3H2"/>
            <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
        </symbol>
        <symbol id="ic-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </symbol>
        <symbol id="ic-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </symbol>
        <symbol id="ic-boardroom" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
        </symbol>
        <symbol id="ic-capture" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </symbol>
    </svg>

    <!-- Main View Mount -->
    <main id="view"></main>

    <!-- Global Floating Action Button -->
    <button id="fab-capture" onclick="location.hash='#/capture'">
        <svg class="ic"><use href="#ic-capture"/></svg>
    </button>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <a href="#/" class="nav-item">
            <svg class="ic"><use href="#ic-mission"/></svg>
            <span>Mission</span>
        </a>
        <a href="#/bibles" class="nav-item">
            <svg class="ic"><use href="#ic-book"/></svg>
            <span>Bibles</span>
        </a>
        <a href="#/boardroom" class="nav-item">
            <svg class="ic"><use href="#ic-boardroom"/></svg>
            <span>Boardroom</span>
        </a>
        <div class="nav-spacer"></div> <!-- Space for FAB -->
        <a href="#/inbox" class="nav-item">
            <svg class="ic"><use href="#ic-inbox"/></svg>
            <span>Inbox</span>
        </a>
        <a href="#/settings" class="nav-item">
            <svg class="ic"><use href="#ic-settings"/></svg>
            <span>Settings</span>
        </a>
    </nav>

    <!-- Engine Scripts -->
    <script src="data/bibles.js"></script>
    <script src="data/pipeline.js"></script>
    <script src="data/journal.js"></script>
    <script src="modules/ai.js"></script>
    <script src="modules/boardroom.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
